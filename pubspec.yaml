name: ae_link
description: Flutter SDK for integrating with the AE-LINK deferred deep linking platform. Enables collection of device fingerprints, matching with stored deep links, and handling of deferred deep links.
version: 1.0.0
publish_to: none

environment:
  sdk: '>=3.3.0 <5.0.0'
  flutter: '>=3.19.0'

dependencies:
  flutter:
    sdk: flutter

  # API and HTTP
  http: ^1.3.0

  # Local storage
  shared_preferences: ^2.5.0

  # Device information
  device_info_plus: ^11.0.0
  package_info_plus: ^8.0.0

  # Deep linking
  app_links: ^6.4.0

  # Network connectivity
  connectivity_plus: ^6.1.0

  # UUID generation
  uuid: ^4.5.0

  # Logging
  logger: ^2.5.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  mockito: ^5.4.5
  mocktail: ^1.0.4

flutter:
  # This library is a plugin; don't include it as a Flutter plugin.
