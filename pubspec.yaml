name: smartlink
description: Flutter SDK for SmartLink — deep linking platform with deferred deep linking, device fingerprinting, and seamless app attribution.
version: 1.0.0
publish_to: none

environment:
  sdk: '>=3.0.0 <5.0.0'
  flutter: '>=3.10.0'

dependencies:
  flutter:
    sdk: flutter

  # API and HTTP — stable API since 1.x
  http: '>=1.0.0'

  # Local storage — stable API since 2.x
  shared_preferences: '>=2.0.0'

  # Device information — stable API across 9-12+
  device_info_plus: '>=9.0.0'
  package_info_plus: '>=4.0.0'

  # Deep linking — SDK handles both v3-5 and v6+ APIs at runtime
  app_links: '>=3.4.0'

  # Network connectivity — List<ConnectivityResult> since v5
  connectivity_plus: '>=5.0.0'

  # Battery level and charging state
  battery_plus: '>=4.0.0'

  # UUID generation
  uuid: '>=4.0.0'

  # Logging
  logger: '>=2.0.0'

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: '>=2.0.0'
  mockito: '>=5.0.0'
  mocktail: '>=1.0.0'

flutter:
  # This library is a plugin; don't include it as a Flutter plugin.
